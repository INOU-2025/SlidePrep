<div class="upload-container">
    <div class="dropzone" (dragover)="onDragOver($event)" (drop)="onDrop($event)">

        <!-- Empty State -->
        <ng-container *ngIf="files.length === 0">
            <mat-icon class="upload-icon">cloud_upload</mat-icon>
            <h3>Drag and drop images or a zip archive here</h3>
            <p>or</p>
            <button mat-stroked-button (click)="fileInput.click()">Browse Files</button>
        </ng-container>

        <!-- Populated State (File List) -->
        <div class="file-list-container" *ngIf="files.length > 0">
            <h3>Selected Files ({{ files.length }})</h3>
            <mat-list>
                <mat-list-item *ngFor="let file of files; let i = index">
                    <mat-icon matListItemIcon>{{ getFileIcon(file) }}</mat-icon>
                    <div matListItemTitle>{{ file.name }}</div>
                    <div matListItemLine>{{ (file.size / 1024 / 1024) | number:'1.2-2' }} MB</div>
                    <button mat-icon-button (click)="removeFile(i)">
                        <mat-icon>close</mat-icon>
                    </button>
                </mat-list-item>
            </mat-list>

            <div class="actions">
                <button mat-button color="warn" (click)="files = []">Clear All</button>
                <button mat-raised-button color="primary" (click)="upload()" [disabled]="isUploading">
                    {{ isUploading ? 'Processing...' : 'Upload and Process' }}
                </button>
                <button mat-stroked-button (click)="fileInput.click()" [disabled]="isUploading"
                    style="margin-left: 10px;">Add More</button>
            </div>

            <div *ngIf="isUploading" class="processing-indicator">
                <mat-progress-bar mode="indeterminate"></mat-progress-bar>
                <p>Stitching images... please wait.</p>
            </div>
        </div>

        <input type="file" #fileInput multiple (change)="onFileSelected($event)" style="display: none;">
    </div>
</div>
