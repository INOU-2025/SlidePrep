<mat-toolbar color="primary" class="top-bar">

    <!-- Home mode -->
    <ng-container *ngIf="mode === 'home'">
        <div class="bar-left">
            <mat-icon class="app-icon">biotech</mat-icon>
            <span class="app-name">SlidePrep</span>
        </div>
        <span class="spacer"></span>
        <button mat-raised-button type="button" color="accent" (click)="newProject()">
            <mat-icon>add</mat-icon>
            New Project
        </button>
    </ng-container>

    <!-- Workspace mode -->
    <ng-container *ngIf="mode === 'workspace'">
        <div class="bar-left">
            <button mat-icon-button type="button" (click)="goBack()" aria-label="Back to home">
                <mat-icon>arrow_back</mat-icon>
            </button>
            <mat-divider [vertical]="true" class="bar-divider"></mat-divider>
            <span class="project-name">{{ project?.name ?? 'Untitled Project' }}</span>
            <span *ngIf="hasResolution" class="resolution">
                {{ project!.width }} × {{ project!.height }} px
            </span>
        </div>
        <span class="spacer"></span>
        <div class="zoom-controls">
            <button mat-icon-button type="button" aria-label="Zoom out" (click)="zoomOut.emit()">
                <mat-icon>zoom_out</mat-icon>
            </button>
            <span class="zoom-label">{{ zoomLabel }}</span>
            <button mat-icon-button type="button" aria-label="Zoom in" (click)="zoomIn.emit()">
                <mat-icon>zoom_in</mat-icon>
            </button>
            <button mat-icon-button type="button" aria-label="Reset zoom" (click)="resetZoom.emit()">
                <mat-icon>fit_screen</mat-icon>
            </button>
        </div>
        <mat-divider [vertical]="true" class="bar-divider"></mat-divider>
        <button mat-stroked-button type="button" class="export-btn" [disabled]="!canExport" (click)="exportSlide()">
            <mat-icon>download</mat-icon>
            Export
        </button>
    </ng-container>

</mat-toolbar>
