<header class="top-bar">

  <!-- Home mode -->
  <ng-container *ngIf="mode === 'home'">
    <div class="wordmark">
      <div class="wordmark-grid">
        <i *ngFor="let i of wordmarkCells" [class.accent]="i % 4 === 0"></i>
      </div>
      <span class="wordmark-text">Slide<span class="accent">Prep</span></span>
    </div>
    <span class="spacer"></span>
    <button class="btn-primary" type="button" (click)="newSlide.emit()">
      <span class="material-symbols-rounded">add</span>
      New slide
    </button>
  </ng-container>

  <!-- Workspace mode -->
  <ng-container *ngIf="mode === 'workspace'">
    <div class="bar-left">
      <button class="icon-btn" type="button" (click)="goBack()" aria-label="Back to slides">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <div class="bar-divider"></div>
      <div class="slide-meta">
        <div class="slide-name">{{ project?.name ?? 'Untitled slide' }}</div>
        <div class="slide-dims">{{ dims }}</div>
      </div>
      <div class="badge" [ngClass]="project?.status">
        <span class="badge-dot" *ngIf="project?.status !== 'failed'"></span>
        {{ project?.status === 'completed' ? 'Completed' : project?.status === 'processing' ? 'Processing' : 'Failed' }}
      </div>
    </div>

    <span class="spacer"></span>

    <div class="bar-right" *ngIf="canShowControls">
      <div class="tool-group">
        <button class="icon-btn" type="button" aria-label="Zoom out" (click)="zoomOut.emit()">
          <span class="material-symbols-rounded">zoom_out</span>
        </button>
        <span class="zoom-label">{{ currentZoomLabel }}</span>
        <button class="icon-btn" type="button" aria-label="Zoom in" (click)="zoomIn.emit()">
          <span class="material-symbols-rounded">zoom_in</span>
        </button>
        <button class="icon-btn" type="button" aria-label="Fit" (click)="resetZoom.emit()">
          <span class="material-symbols-rounded">fit_screen</span>
        </button>
      </div>
      <button class="icon-btn icon-btn--solid" type="button" aria-label="Export" (click)="export.emit()">
        <span class="material-symbols-rounded">download</span>
      </button>
    </div>
  </ng-container>

</header>
