version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    platform: linux/amd64
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost
    depends_on:
      - redis

  worker:
    build: .
    platform: linux/amd64
    command: celery -A worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  redis_data:
